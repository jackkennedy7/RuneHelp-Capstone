<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
<title>RuneHelp</title>
</head>
<body>

<!-- OSRS Wiki-style header bar -->
<div class="site-header">
  <div class="site-logo">
    <span class="logo-icon">⚔️</span>
    <span class="logo-text">Rune<strong>Help</strong></span>
  </div>
  <nav class="site-nav">
    <a href="#">Tracker</a>
    <a href="#">News</a>
    <a href="#">Chat</a>
  </nav>
</div>

<div class="page-wrapper">

  <div class="left-panel">
    <div class="news">
      <section class="news_content">
        <h2>Latest News</h2>
        <div class="article">
          <img src="https://oldschool.runescape.wiki/images/Main_page_-_Music_System_Improvements_%26_Deadman_Tweaks.png?34158" alt="Music Update">
          <h4>Music System Improvements &amp; Deadman Tweaks</h4>
          <a href="https://oldschool.runescape.wiki/w/Update:Music_System_Improvements_%26_Deadman_Tweaks" target="_blank">Read More →</a>
        </div>
        <div class="article">
          <img src="https://oldschool.runescape.wiki/images/Main_page_-_25th_Anniversary_Event-_25_Years%2C_25_Mementos%21.png?6be40" alt="Anniversary Event">
          <h4>25th Anniversary Event!</h4>
          <a href="https://oldschool.runescape.wiki/w/25th_Anniversary_event" target="_blank">Read More →</a>
        </div>
        <div class="article">
          <h4>Article Three</h4>
        </div>
      </section>
    </div>
  </div>

  <div class="content-col">
    <div class="main-col">
      <div class="user_search">
        <section class="search">
          <input type="text" placeholder="Enter username" id="searchInput">
          <button id="searchButton">Search</button>
        </section>
        <section class="results"></section>
      </div>
      <div id="player-container"></div>
    </div>
  </div>

</div>

<!-- Chat widget: fixed, floats over everything -->
<div class="chat-widget">
  <div class="chat-box" id="chatBox">
    <div class="chat-header">
      <span>⚔️ RuneHelper</span>
      <button class="chat-close" id="chatClose">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-msg bot">Greetings adventurer! How can I help?</div>
    </div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="Ask me anything...">
      <button id="chatSend">➤</button>
    </div>
  </div>
  <button class="chat-bubble" id="chatBubble">⚔️</button>
</div>

<script src="script.js"></script>
</body>
</html>
