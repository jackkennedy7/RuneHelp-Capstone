<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <title>RuneHelp</title>
</head>
    
<body>
    
    <!-- OSRS Wiki-style header bar -->
<div class="site-header">
  <div class="site-logo">
    <span class="logo-icon">⚔️</span>
    <span class="logo-text">Rune<strong>Help</strong></span>
  </div>
  <nav class="site-nav">
    <a href="#">Tracker</a>
    <a href="#">News</a>
    <a href="#">Chat</a>
  </nav>
</div>
    
    <div class="page-wrapper">

  <div class="left-panel">
    <div class="news">
      <section class="news_content">
        <h2>Latest News</h2>
        <div id="a1">
          <img src="https://oldschool.runescape.wiki/images/Main_page_-_Easter_2026_%26_PvP_QoL_Improvements.png?b0402" alt="Easter!">
          <h4>Easter 2026 & PVP Improvements</h4>
          <a href="https://oldschool.runescape.wiki/w/Update:Easter_2026_%26_PvP_QoL_Improvements" target="_blank">Read More →</a>
        </div>
        <div id="a1">
          <img src="https://oldschool.runescape.wiki/images/Main_page_-_Boat_Combat_Fixes.png?0e34d" alt="Boats">
          <h4>Boat Combat Fixes</h4>
          <a href="https://oldschool.runescape.wiki/w/Update:Boat_Combat_Fixes" target="_blank">Read More →</a>
        </div>
        <div id="a1">
          <img src="https://oldschool.runescape.wiki/images/Main_page_-_More_from_the_Getting_Around_Poll.png?ca5d0" alt="zZz">
          <h4>More from the Getting Around Poll</h4>
          <a href="https://oldschool.runescape.wiki/w/Update:More_from_the_Getting_Around_Poll" target="_blank">Read More →</a>
        </div>
      </section>
    </div>
  </div>

  <div class="content-col">       <!-- ← wrap these two together -->

    <div class="main-col">
      <div class="user_search">
        <section class="search">
          <input type="text" placeholder="Enter username" id="searchInput">
          <button id="searchButton">Search</button>
        </section>
        <section class="results"></section>
      </div>
      <div id="player-container"></div>
    </div>

    <div class="chat-widget">
  <div class="chat-box" id="chatBox">
    <div class="chat-header">
      <span>⚔️ RuneHelper</span>
      <button class="chat-close" id="chatClose">✕</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-msg bot">Greetings adventurer! How can I help?</div>
    </div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="Ask me anything...">
      <button id="chatSend">➤</button>
    </div>
  </div>
  <button class="chat-bubble" id="chatBubble">⚔️</button>
</div>

  </div>                           <!-- ← close content-col -->

</div>
    
    <script src="script.js"></script>
    
</body>
</html>
